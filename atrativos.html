                        <style>
                                /* Estrutura de 3 colunas responsiva */
                                .grid-container {
                                display: grid;
                                grid-template-columns: repeat(3, 1fr);
                                gap: 20px;
                                padding: 20px;
                                font-family: Arial, sans-serif;
                                }

                                /* Estilização de cada caixa (item) */
                                details {
                                border: 1px solid #ccc;
                                border-radius: 4px;
                                padding: 15px;
                                background-color: #f9f9f9;
                                }

                                /* Título clicável /
                                summary {
                                font-weight: bold;
                                cursor: pointer;
                                list-style: none; / Esconde a seta padrão no Chrome/Firefox */
                                display: flex;
                                justify-content: space-between;
                                align-items: center;
                                }

                                /* Esconde a seta padrão no Safari */
                                summary::-webkit-details-marker {
                                display: none;
                                }

                                /* Adiciona o sinal de + visual */
                                summary::after {
                                content: "+";
                                font-size: 1.2em;
                                }

                                /* Muda para - quando o item está aberto */
                                details[open] summary::after {
                                content: "-";
                                }

                                /* Espaçamento do conteúdo interno */
                                .conteudo {
                                margin-top: 15px;
                                border-top: 1px solid #eee;
                                padding-top: 10px;
                                font-size: 0.9em;
                                color: #444;
                                }

                                /* Ajuste para telas de celular */
                                @media (max-width: 768px) {
                                .grid-container {
                                grid-template-columns: 1fr;
                                }
                                }
                                </style>
                                </head>
